name: Verify compiled workflows

on:
  pull_request:
    paths:
      - '.github/workflows/*.md'
      - '.github/workflows/*.lock.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gh-aw CLI
        uses: github/gh-aw/actions/setup-cli@main
        with:
          version: v0.67.4
      - name: Determine changed workflows
        id: changed-workflows
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "${BASE_REF}" --depth=1
          changed="$(git diff --name-only "origin/${BASE_REF}...HEAD" -- '.github/workflows/*.md' '.github/workflows/*.lock.yml')"
          declare -A unique=()
          while IFS= read -r path; do
            [ -n "${path}" ] || continue
            file="$(basename "${path}")"
            if [[ "${file}" == *.lock.yml ]]; then
              workflow="${file%.lock.yml}"
            else
              workflow="${file%.md}"
            fi
            if [[ -f ".github/workflows/${workflow}.md" ]]; then
              unique["${workflow}"]=1
            fi
          done <<< "${changed}"

          {
            echo 'targets<<EOF'
            for workflow in "${!unique[@]}"; do
              echo "${workflow}"
            done | sort
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"
      - name: Recompile changed workflows
        if: steps.changed-workflows.outputs.targets != ''
        env:
          TARGETS: ${{ steps.changed-workflows.outputs.targets }}
        run: |
          while IFS= read -r workflow; do
            [ -n "${workflow}" ] || continue
            gh aw compile "${workflow}"
          done <<< "${TARGETS}"
      - name: No changed workflows
        if: steps.changed-workflows.outputs.targets == ''
        run: echo "No workflow markdown or lockfile changes detected."
      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git diff)" ]; then
            echo "::error::Generated workflow files are out of date. Run 'gh aw compile' and commit the results."
            echo ""
            git diff --stat
            echo ""
            git diff -- '.github/aw/actions-lock.json' '.github/workflows/*.lock.yml'
            exit 1
          fi
          echo "All generated workflow files are up to date."
